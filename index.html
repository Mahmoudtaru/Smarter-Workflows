        @keyframes blink-caret {

        }
        
        .typewriter-anim {
            overflow: hidden; white-space: nowrap; margin: 0 auto; letter-spacing: .05em;

        }
        .dark .content-card {

            border-color: var(--accent-green);
            color: var(--text-light);
        }

            background-color: #ffffff;
            border: 2px solid var(--accent-navy);
            border-right: 6px solid var(--accent-green);
            border-radius: 0.75rem;
            margin-bottom: 1.25rem;
            overflow: hidden;

        }

            background-color: #f8fafc;

            font-weight: 800;
            font-size: 1.1rem;
            color: var(--accent-navy);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-navy);

        }

        }

            { id: "wf-5", title: "5. مسار صناعة وتعديل الصور (Image Generation)", icon: "image", needs: ["هل تريد بناء أمر (برومبت) لتوليد صورة من خيالك من الصفر (Text to Image)؟", "هل تمتلك صورة وتريد استخدامها كـ (مرجع - Reference) لمحاكاة نفس الاستايل أو لدمجها في صورة جديدة؟", "هل تمتلك صورة تعجبك وتريد معرفة الأمر الذي كُتب لتوليدها (الهندسة العكسية)؟"], methods: [{ title: "التوليد من الصفر (Text to Image):", text: "استخدم مساعد الصور، واشرح له الفكرة، زوايا الكاميرا، والإضاءة المطلوبة، ليقوم بضبط الأمر الاحترافي الذي ستضعه في أداة التوليد." }, { title: "استخدام صورة كمرجع (Image Reference):", text: "ارفع الصورة المرجعية لأدوات التوليد (مثل Flow أو Midjourney)، واطلب منها إنشاء صورة جديدة تماماً ولكن مع الالتزام بنفس الستايل اللوني أو نفس ملامح الشخصية الموجودة في الصورة المرجعية." }, { title: "الهندسة العكسية (Reverse Engineering):", text: "ارفع الصورة التي تعجبك لمساعد (Image to Text)، واطلب منه: «حلل هذه الصورة واستخرج البرومبت الدقيق الذي تم إنشاؤها به». خذ البرومبت الناتج وعدل عليه (مثل تغيير الأشخاص أو المكان) وضعه في أداة التوليد." }], toolsList: ["Nano Banana Pro (للصور العربية)", "Flow", "Midjourney", "Seedream", "GPTimage"], targetCategory: "صور", assistantsGroups: [{ title: "لتوليد وهندسة الأوامر (Image Mood):", links: [{ name: "نسخة ChatGPT", url: "https://chatgpt.com/g/g-68fea03a56dc8191a1a9d28a4fad9fca-image-mood" }, { name: "نسخة Gemini", url: "https://gemini.google.com/gem/d17049195aae" }] }, { title: "لاستخراج الأوامر من الصور (Image to Text Mood):", links: [{ name: "نسخة ChatGPT", url: "https://chatgpt.com/g/g-69d59caa0c948191b35ee89ba0d6ed1b-image-to-text-mood" }, { name: "نسخة Gemini", url: "https://gemini.google.com/gem/1YhsJoW5qWaaxUBh8QH4QTnvkg8RBk2NK?usp=sharing" }] }], tip: "كلما كان وصف الإضاءة وزاوية العدسة دقيقاً في البرومبت، كلما ظهرت الصورة أقرب للواقع وأبعد عن المظهر «الكرتوني» المعتاد للذكاء الاصطناعي." },
            { id: "wf-6", title: "6. مسار صناعة الفيديوهات والتحريك (Video Creation)", icon: "video", needs: ["هل تريد توليد فيديو سينمائي كلياً بالذكاء الاصطناعي؟", "هل تريد تصميم «أفاتار متكلم» متكامل؟", "هل تريد نقل حركة شخص حقيقي لصورة ثابتة (Motion Control)؟"], methods: [{ title: "التوليد الكلي بالذكاء الاصطناعي:", text: "نص لفيديو (Text to video): لو فيديو قصير استخدم النص. صورة لفيديو (Image to Video): لفيديوهات طويلة متناسقة، قم أولاً بتوليد صورة للمشهد الافتتاحي (First Frame) وصورة للمشهد الختامي (Last Frame)، وارفع الصورتين للأداة واطلب منها ربط المشهدين لضمان الترابط السينمائي." }, { title: "تصميم الأفاتار المتكلم (AI Avatar):", text: "1. صمم صورة ثابتة للشخصية في الاستوديو. 2. جهز الصوت. 3. ارفع الصورة وملف الصوت لمنصات الأفاتار للمزامنة (Lip-sync)." }, { title: "نقل الحركة (Motion Control):", text: "جهز الفيديو الأصلي للشخص الحقيقي الذي يتحرك. ثم جهز الصورة الثابتة التي تريد نقل الحركة إليها. ارفع الملفين لموقع زي Kling، وفي قسم التعليمات المتقدمة اكتب أمراً يشدد على الالتزام بالواقعية ونقل الحركة دون تشويه." }], toolsList: ["Kling", "Seedance", "Veo", "HeyGen", "Pippit"], targetCategory: "فيديو", assistantsGroups: [{ title: "لرسم الستوري بورد وهندسة المشاهد (Video Mood):", links: [{ name: "نسخة ChatGPT", url: "https://chatgpt.com/g/g-68ff5eaa948c8191b97b52768811dec8-video-mood" }, { name: "نسخة Gemini", url: "https://gemini.google.com/gem/dbd9d2431eca" }] }], tip: "السر في الفيديوهات سريعة الانتشار هو «الستوري بورد». اطلب من المساعد أولاً كتابة سيناريو مقسم إلى مشاهد، قبل البدء في توليد أي فيديو. يفضل ان الفيديو المستخدم في نقل الحركة يحتوي علي شخص واحد فقط." },
            { id: "wf-7", title: "7. مسار الهندسة الصوتية والبودكاست (Voice & Audio)", icon: "audio-lines", needs: ["هل تريد تحويل نص مكتوب لتعليق صوتي (Text-to-Speech)؟", "هل تريد تغيير صوتك الحالي لصوت شخصية أخرى (Voice Changer)؟", "هل تريد استنساخ صوتك لتوليد نصوص جديدة مستقبلاً (Voice Cloning)؟", "هل تريد تحويل ملفات دسمة إلى حلقة بودكاست؟"], methods: [{ title: "تحويل النص لصوت:", text: "حدد النص، اختر الصوت والشخصية المناسبة من مكتبة الأداة، واكتب تعليمات الإلقاء بوضوح." }, { title: "تغيير الصوت (Voice Changer):", text: "سجل الصوت بنفسك بطريقتك ومقاماتك ومشاعرك الحقيقية، ثم ارفع هذا التسجيل للأداة واطلب منها تغيير خامة الصوت لتبدو كصوت رجل عجوز، أو طفل، مع الاحتفاظ بنفس المشاعر." }, { title: "استنساخ الصوت (Voice Cloning):", text: "قم برفع عينة صوتية واضحة لك (15-30 ثانية). ستقوم الأداة بصنع «نسخة رقمية» من نبرة صوتك لتقرأ أي نص مستقبلاً." }, { title: "البودكاست:", text: "ارفع الكتب أو المقالات إلى NotebookLM واطلب توليد (Audio Overview) ليقوم بتحويل المحتوى إلى نقاش إذاعي بين شخصين." }], toolsList: ["Google AI Studio", "Minimax", "Fish Audio", "ElevenLabs", "NotebookLM"], targetCategory: "صوت", assistantsGroups: [{ title: "للهندسة الصوتية والمشاريع (Voice Mood):", links: [{ name: "نسخة ChatGPT", url: "https://chatgpt.com/g/g-69dfc148364c8191af327ddc7f13314c-voice-mood" }, { name: "نسخة Gemini", url: "https://gemini.google.com/gem/19mR4k6oy2DATekTHRD6KUZyliB6QLG-B?usp=sharing" }] }], tip: "" },
            { id: "wf-8", title: "8. مسار التعلم الفائق والمذاكرة (Guided Learning)", icon: "graduation-cap", needs: ["هل تريد المذاكرة من مصادرك الخاصة (مذكرات، محاضرات، ملفات PDF)؟", "أم تريد تعلم مهارة جديدة كلياً من الصفر؟"], methods: [{ title: "المذاكرة من مصادرك:", text: "قم برفع كل محاضراتك وملفاتك إلى NotebookLM كقاعدة معرفية. اطلب منه توليد (Flashcards) أو كويزات سريعة ليختبرك في المعلومات التي قمت برفعها." }, { title: "تعلم مهارة جديدة:", text: "المشكلة الكبرى هي أن النماذج تقوم بسرد المعلومات دفعة واحدة. الحل هو تفعيل وضع «المدرس الخصوصي» (Guided Learning). أخبره: «أريد تعلم كذا، اسألني خطوة بخطوة، واختبر مستواي قبل الانتقال للنقطة التالية»." }], toolsList: ["NotebookLM", "Gemini", "ChatGPT"], targetCategory: "تعلم فعال", assistantsGroups: [{ title: "للبودكاست والتعلم (NotebookLM Mood):", links: [{ name: "نسخة ChatGPT", url: "https://chatgpt.com/g/g-68f6cc30b078819197b1375a44e8ca83-notebooklm-mood" }, { name: "نسخة Gemini", url: "https://gemini.google.com/gem/ac08e2d00ff7" }] }, { title: "للتعلم خطوة بخطوة: مساعد Universal Primer", links: [{ name: "نسخة ChatGPT", url: "https://chatgpt.com/g/g-GbLbctpPz-universal-primer" }] }, { title: "للتلخيص بأسلوب د. محمود حرب (Smarter Mood):", links: [{ name: "نسخة ChatGPT", url: "https://chatgpt.com/g/g-68f0f763bd24819192d82c0187cad244-smarter-mood" }, { name: "نسخة Gemini", url: "https://gemini.google.com/gem/2c3c6d25f368" }] }], tip: "في NotebookLM، استخدم خاصية (Learning Guide) لتحويل أي ملف معقد إلى دليل دراسي شامل بضغطة زر." },
            { id: "wf-9", title: "9. مسار البرمجة والتطبيقات (Vibe Coding)", icon: "code", needs: ["هل تريد تصميم تطبيق ويب أو موقع تعريفي لخدماتك؟", "أم تريد برمجة لعبة تفاعلية بسيطة لمشاركتها مع الآخرين؟", "هل تبدأ من وصف نصي أم من صورة (سكرين شوت) لموقع يعجبك؟"], methods: [{ title: "التصميم خطوة بخطوة:", text: "ابدأ المحادثة برفع السكرين شوت أو الوصف النصي. تأكد من تفعيل بيئة العمل (Canvas)." }, { title: "التعديل البصري:", text: "سيظهر الكود في شاشة، والتصميم المبدئي في شاشة أخرى. لا تكتب أكواداً لتعديل الموقع؛ بل استخدم البرومبت العادي: «غير لون هذا الزر للأحمر»، وسيقوم هو بتحديث الكود فوراً." }, { title: "بناء إضافات المتصفح:", text: "يمكنك أيضاً طلب بناء إضافة للمتصفح (Chrome Extension) بخطوات بسيطة ونسخ الكود ولصقه مباشرة." }, { title: "رفع الكود والمشاركة:", text: "بعد الانتهاء، انسخ الكود النهائي وقم برفعه على منصة مجانية مثل GitHub لتحصل على رابط حقيقي للموقع." }], toolsList: ["Gemini Canvas", "ChatGPT Canvas", "Claude Code", "Cursor", "Windsurf", "GitHub"], targetCategory: "وكلاء الذكاء الاصطناعي", assistantsGroups: [{ title: "للمواقع والتطبيقات (Web/App Mood):", links: [{ name: "نسخة ChatGPT", url: "https://chatgpt.com/g/g-68f871de1834819187de2b11bd4af145-web-app-mood" }, { name: "نسخة Gemini", url: "https://gemini.google.com/gem/ccc6a7afa824" }] }], tip: "لا تطلب بناء الموقع كاملاً في أمر واحد. اطلب الهيكل الأساسي أولاً، ثم إضافة الألوان، ثم الصور، خطوة بخطوة. لا تكتفي بالنتيجة الأولى، وتقدر تستخدم ميزة (Select and Ask) عشان تعلم علي أي حاجة ويعدلهالك فوراً." },
            { id: "wf-10", title: "10. مسار بيئة العمل وتحليل البيانات (Workspace & Office)", icon: "briefcase", needs: ["هل تستخدم تطبيقات Google لتنظيم عملك؟", "أم تعتمد بشكل كبير على برامج Microsoft Office (خاصة Excel و Word) للملفات الضخمة؟"], methods: [{ title: "Google Workspace:", text: "استخدم الذكاء الاصطناعي داخل Google Docs لإعادة صياغة التقارير، أو داخل Forms لتوليد كويزات واستبيانات." }, { title: "Microsoft Office والبيانات المعقدة:", text: "عندما يتعلق الأمر بملفات الإكسيل الضخمة وتحليل البيانات المعقدة، قم برفع الشيت إلى (Claude) واطلب منه تحليله للحصول على نتائج استثنائية في الدقة." }], toolsList: ["Claude.ai", "Google Docs AI", "Google Forms AI"], targetCategory: "استخدام يومي", assistantsGroups: [{ title: "لإعادة تنظيم النصوص وهيكلتها (المنسق المحترف):", links: [{ name: "نسخة ChatGPT", url: "https://chatgpt.com/g/g-68f50e7379b88191add70c6858cc7b6e-lmnsq-lmhtrf" }, { name: "نسخة Gemini", url: "https://gemini.google.com/gem/a41d02a879cc" }] }, { title: "لتحليل البيانات الدقيقة:", links: [{ name: "مساعد Data Analysis & Report AI", url: "https://chatgpt.com/g/g-2OebMtWeG-data-analysis-report-ai" }] }, { title: "إضافات Claude الرسمية لبرامج Office:", links: [{ name: "إضافة Excel", url: "https://marketplace.microsoft.com/en-us/product/saas/wa200009404?tab=overview" }, { name: "إضافة PowerPoint", url: "https://marketplace.microsoft.com/en-us/product/office/WA200010001?tab=Overview" }] }], tip: "استخدم Claude دائماً عندما يكون لديك ملف Word ضخم جداً أو شيت Excel مليء بالمعادلات وتحتاج لمساعد قادر على قراءة السياق بالكامل دون ضياع معلومات." },
            { id: "wf-11", title: "11. مسار المساعدين الشخصيين (Custom GPTs & Gems)", icon: "bot", needs: ["هل تريد بناء «مساعد شخصي دائم» يقوم بمهمة محددة في عملك؟", "هل تريد تدريب نموذج ليكون المراجع اللغوي أو كاتب الإعلانات الخاص بك؟"], methods: [{ title: "بناء المساعد الشخصي:", text: "1. تحدث مع (Gem Builder Mood) واشرح له فكرتك ليصيغ «التعليمات الدقيقة». 2. افتح (Explore GPTs) أو (Gem Manager) وقم بإنشاء مساعد جديد. 3. الخطوة الأهم: ارفع ملفات أعمالك السابقة أو أمثلة في قسم (Knowledge Base) ليعتمد عليها المساعد ولا يقوم بتأليف معلومات من عنده." }], toolsList: ["ChatGPT (Explore GPTs)", "Gemini (Gem Manager)"], targetCategory: "وكلاء الذكاء الاصطناعي", assistantsGroups: [{ title: "لتخطيط وبناء المساعدين (Gem Builder Mood):", links: [{ name: "نسخة ChatGPT", url: "https://chatgpt.com/g/g-68f3759786e48191b7ce1e7ca3f11158-gem-builder-mood" }, { name: "نسخة Gemini", url: "https://gemini.google.com/gem/98bb0d1cf7db" }] }], tip: "المساعد الشخصي بدون «قاعدة معرفية» (ملفات PDF مرفوعة مسبقاً) هو مجرد محادثة عادية. قوة المساعد تكمن في الملفات التي تدربه عليها." },

                const initialTheme = storedTheme === 'dark' || (!storedTheme && prefersDark) ? 'dark' : 'light';
                setTheme(initialTheme);
            }, []);

            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', theme);
            }, [theme]);

            const handleThemeToggle = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');

                setActiveTab(tabId);

    <script>
        function setupWelcomeScreen() {
            const welcomeScreen = document.getElementById('welcome-screen');
            const appContent = document.getElementById('root');
            const startBtn = document.getElementById('start-btn');
            const titleEl = document.getElementById('welcome-title');
            const subtitleEl = document.getElementById('welcome-subtitle');
            
            const titleText = "مسارات Workflows";
            const subtitleText = "أذكى بمساعدة الذكاء الاصطناعي 💚";

            function applyTypewriter(element, text, speed, direction, callback) {
                let i = 0; element.innerHTML = "";
                element.classList.add('typewriter-anim', (direction === 'ltr' ? 'typewriter-ltr' : 'typewriter-rtl'));
                function type() {
                    if (i < text.length) { 
                        element.innerHTML += text.charAt(i); 
                        i++; 
                        setTimeout(type, speed); 
                    } else { 
                        setTimeout(() => {
                             element.classList.remove('typewriter-anim', 'typewriter-ltr', 'typewriter-rtl');
                             element.style.borderRight = 'none'; 
                             element.style.borderLeft = 'none';
                            if (callback) callback();
                        }, 500); 
                    }
                }
                type();
            }

            setTimeout(() => {
                applyTypewriter(titleEl, titleText, 80, 'rtl', () => {
                    setTimeout(() => {
                        applyTypewriter(subtitleEl, subtitleText, 60, 'rtl', () => {
                            setTimeout(() => {
                                startBtn.classList.remove('opacity-0');
                                startBtn.classList.add('animate-fadeInUp', 'pulse-animate');
                            }, 300);
                        });
                    }, 200);
                });
            }, 1000);

            startBtn.addEventListener('click', () => {
                welcomeScreen.classList.add('opacity-0');
                setTimeout(() => {
                    welcomeScreen.style.display = 'none';
                    if (appContent) appContent.classList.remove('hidden'); 
                }, 700);
            });
        }
        document.addEventListener('DOMContentLoaded', () => setupWelcomeScreen());
